name: CI PIPELINE

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run Linter
        run: npm run lint

      - name: Generate prisma client
        run: npx prisma generate

      - name: Build TypeScript
        run: npm run build

      - name: Run Tests
        run: npm test
